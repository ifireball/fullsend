# Cloudflare Worker + static assets. User Worker entry is worker/src/index.ts (stub passes through ASSETS).
# Deploy: site-deploy.yml checks out the default branch (trusted TOML), downloads the Build Site artifact to _bundle/, copies only ./public/ and ./worker/ from it, then runs Wrangler here.
# The workflow passes --name to match your account Worker name (GitHub variable CLOUDFLARE_PROJECT_NAME).
# See: https://developers.cloudflare.com/workers/static-assets/

name = "documentation-site"
main = "worker/src/index.ts"
compatibility_date = "2026-04-09"
workers_dev = true
preview_urls = true

# Local dev: `npm run dev` sets CLOUDFLARE_INCLUDE_PROCESS_ENV so Wrangler reads `GITHUB_APP_*`
# from the same process environment as Vite. Deployed/preview: set vars or secrets in Cloudflare / CI.

[assets]
directory = "./public"
not_found_handling = "single-page-application"

# Native rate limits (Wrangler ≥ 4.36). namespace_id values are account-unique integers (see Cloudflare docs).
[[ratelimits]]
name = "OAUTH_TOKEN_RATE_LIMITER"
namespace_id = "482401"
  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "GITHUB_USER_RATE_LIMITER"
namespace_id = "482402"
  [ratelimits.simple]
  limit = 5
  period = 60
